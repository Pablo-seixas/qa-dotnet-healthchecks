name ci

on:
  push:
  pull_request:

jobs:
  build_test_static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: restore
        run: |
          echo restore stage

      - name: build
        run: |
          echo build stage

      - name: test
        run: |
          echo test stage

      - name: semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

  functional_sample:
    runs-on: ubuntu-latest
    needs: build_test_static
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

